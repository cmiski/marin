services:
  postgres:
    image: postgres:16-alpine
    container_name: marin-postgres
    environment:
      POSTGRES_DB: search_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d search_service']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - search-service

  redis:
    image: redis:7-alpine
    container_name: marin-redis
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - search-service

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.2
    container_name: marin-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: 'false'
      ES_JAVA_OPTS: -Xms1g -Xmx1g
      cluster.name: marin-search
      node.name: marin-es01
    ports:
      - '9200:9200'
      - '9300:9300'
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'curl -fsS http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s || exit 1'
        ]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - search-service

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.2
    container_name: marin-kibana
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - '5601:5601'
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://localhost:5601/api/status || exit 1']
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - search-service

volumes:
  postgres-data:
  redis-data:
  elasticsearch-data:

networks:
  search-service:
    driver: bridge
